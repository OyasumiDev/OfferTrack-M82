app:
  name: "OfferTrack M82"
  version: "1.0.0"
  env: development

ai:
  provider: gemini
  model: gemini-2.0-flash
  timeout_seconds: 30
  max_retries: 3

qdrant:
  host: localhost
  port: 6334
  collections:
    jobs: jobs
    profile: profile
    cvs: cv_versions
    memory: claude_memory

scraper:
  base_url: http://localhost:3001
  timeout_seconds: 60

embedding:
  model: BAAI/bge-small-en-v1.5
  dimensions: 384

export:
  output_dir: ./exports
  formats:
    - markdown
    - pdf
    - docx
